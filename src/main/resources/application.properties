spring.datasource.url=jdbc:mysql://localhost:3306/db_vendas?createDatabaseIfNotExist=true&useTimezone=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT config
api.security.token.secret=${JWT_SECRET:minha-chave-secreta-muito-segura-e-longa-para-jwt-1234567890}
api.security.token.expiration=${JWT_EXPIRATION:86400000}

# Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
